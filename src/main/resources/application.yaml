spring:
  application:
    name: Dating
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/mydatabase}
    username: ${DATABASE_USERNAME:myuser}
    password: ${DATABASE_PASSWORD:secret}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jooq:
    sql-dialect: postgres

dating:
  auth:
    issuer: dating-api
    access-token-ttl: 15m
    refresh-token-ttl: 30d
    max-active-sessions: 5
    refresh-token-pepper: ${REFRESH_TOKEN_PEPPER:local-dev-refresh-pepper-change-me}
    paseto:
      key-id: ${PASETO_KEY_ID:local-dev-key}
      private-key-base64: ${PASETO_PRIVATE_KEY_BASE64:}
      public-key-base64: ${PASETO_PUBLIC_KEY_BASE64:}
      allow-dev-generated-key: ${PASETO_ALLOW_DEV_GENERATED_KEY:true}

server:
  error:
    whitelabel:
      enabled: false
